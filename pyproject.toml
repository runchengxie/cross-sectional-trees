[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cross-sectional-machine-learning"
version = "0.1.0"
description = "Cross-sectional factor mining with pluggable machine learning models"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "numpy>=1.23",
  "pandas>=2.0",
  "pandas-ta>=0.3.14b0",
  "pyarrow>=12.0",
  "pyyaml>=6.0",
  "python-dotenv>=1.0",
  "scikit-learn>=1.2",
  "xgboost>=1.7",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4",
  "pytest-cov",
]
duckdb = [
  "duckdb>=1.2",
]
liveops-hk = [
  "openpyxl>=3.1",
]
rqdata = [
  "rqdatac>=3.4.3",
  "rqdatac-hk",
  "rqsdk",
]
stats = [
  "scipy>=1.10",
]

[project.scripts]
csml = "csml.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
addopts = "-q --disable-warnings --maxfail=1 --strict-markers"
markers = [
  "integration: cross-module end-to-end tests",
  "slow: heavier offline regression tests",
]

[tool.uv]
# `rqsdk` still imports `pkg_resources` from its sdist build step.
# Setuptools removed `pkg_resources` in v82, so constrain build-time
# setuptools until upstream fixes its packaging metadata.
build-constraint-dependencies = ["setuptools<82"]

[tool.uv.extra-build-dependencies]
rqsdk = ["setuptools"]
rqdatac-fund = ["setuptools"]
