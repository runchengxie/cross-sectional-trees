name: tests

on:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_LOCKED: "true"
  HK_DATA_PLATFORM_REF: "42b5765ed863b3dc097d9f87a76d428495debf98"

defaults:
  run:
    working-directory: cross-sectional-trees

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          path: cross-sectional-trees
      - uses: actions/checkout@v6
        with:
          repository: runchengxie/hk-data-platform
          ref: ${{ env.HK_DATA_PLATFORM_REF }}
          token: ${{ secrets.HK_DATA_PLATFORM_READ_TOKEN || github.token }}
          path: market-data-platform
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.11"
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Install dependencies
        run: uv sync --locked --extra dev
      - name: Run fast offline regression
        run: ./scripts/dev/run_tests.sh fast

  slow:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          path: cross-sectional-trees
      - uses: actions/checkout@v6
        with:
          repository: runchengxie/hk-data-platform
          ref: ${{ env.HK_DATA_PLATFORM_REF }}
          token: ${{ secrets.HK_DATA_PLATFORM_READ_TOKEN || github.token }}
          path: market-data-platform
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.11"
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Install dependencies
        run: uv sync --locked --extra dev
      - name: Run slow offline regression
        run: ./scripts/dev/run_tests.sh slow

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          path: cross-sectional-trees
      - uses: actions/checkout@v6
        with:
          repository: runchengxie/hk-data-platform
          ref: ${{ env.HK_DATA_PLATFORM_REF }}
          token: ${{ secrets.HK_DATA_PLATFORM_READ_TOKEN || github.token }}
          path: market-data-platform
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.11"
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Install dependencies
        run: uv sync --locked --extra dev
      - name: Run integration tests
        run: ./scripts/dev/run_tests.sh integration

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          path: cross-sectional-trees
      - uses: actions/checkout@v6
        with:
          repository: runchengxie/hk-data-platform
          ref: ${{ env.HK_DATA_PLATFORM_REF }}
          token: ${{ secrets.HK_DATA_PLATFORM_READ_TOKEN || github.token }}
          path: market-data-platform
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.11"
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Install dependencies
        run: uv sync --locked --extra dev
      - name: Run Pyright typecheck
        run: ./scripts/dev/run_tests.sh typecheck

  rqdata-extra-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          path: cross-sectional-trees
      - uses: actions/checkout@v6
        with:
          repository: runchengxie/hk-data-platform
          ref: ${{ env.HK_DATA_PLATFORM_REF }}
          token: ${{ secrets.HK_DATA_PLATFORM_READ_TOKEN || github.token }}
          path: market-data-platform
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.11"
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Install dependencies
        run: uv sync --locked --extra dev --extra rqdata
      - name: Smoke rqdata extra
        run: |
          uv run python -c "import rqdatac; print(rqdatac.__name__)"
          uv run python -c "from market_data_platform import rqdata_runtime; print(rqdata_runtime.__name__)"
          uv run cstree --help > /dev/null

  duckdb-extra-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          path: cross-sectional-trees
      - uses: actions/checkout@v6
        with:
          repository: runchengxie/hk-data-platform
          ref: ${{ env.HK_DATA_PLATFORM_REF }}
          token: ${{ secrets.HK_DATA_PLATFORM_READ_TOKEN || github.token }}
          path: market-data-platform
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.11"
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Install dependencies
        run: uv sync --locked --extra dev --extra duckdb
      - name: Smoke duckdb extra
        run: |
          uv run python -c "import duckdb; print(duckdb.__version__)"
          uv run marketdata data query --sql "select 1 as value" > /dev/null

  liveops-hk-extra-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          path: cross-sectional-trees
      - uses: actions/checkout@v6
        with:
          repository: runchengxie/hk-data-platform
          ref: ${{ env.HK_DATA_PLATFORM_REF }}
          token: ${{ secrets.HK_DATA_PLATFORM_READ_TOKEN || github.token }}
          path: market-data-platform
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.11"
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Install dependencies
        run: uv sync --locked --extra dev --extra liveops-hk
      - name: Smoke liveops-hk extra
        run: |
          uv run python -c "import openpyxl; print(openpyxl.__version__)"
          uv run python -c "from pathlib import Path; import pandas as pd; from cstree.liveops.alloc_hk import write_xlsx_report; out = Path('/tmp/alloc_hk_smoke.xlsx'); write_xlsx_report(out, pd.DataFrame([{'symbol': '0001.HK'}]), pd.DataFrame([{'as_of': '2026-03-20'}]), pd.DataFrame([{'symbol': '0001.HK'}])); assert out.exists() and out.stat().st_size > 0"

  stats-extra-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          path: cross-sectional-trees
      - uses: actions/checkout@v6
        with:
          repository: runchengxie/hk-data-platform
          ref: ${{ env.HK_DATA_PLATFORM_REF }}
          token: ${{ secrets.HK_DATA_PLATFORM_READ_TOKEN || github.token }}
          path: market-data-platform
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.11"
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Install dependencies
        run: uv sync --locked --extra dev --extra stats
      - name: Smoke stats extra
        run: |
          uv run python -c "import scipy; print(scipy.__version__)"
          uv run python -c "import pandas as pd; from cstree.metrics import summarize_ic; series = pd.Series([0.1, -0.1, 0.2]); stats = summarize_ic(series); assert 'p_value' in stats and stats['p_value'] == stats['p_value']"
