market: hk

data:
  provider: "rqdata"
  source_mode: "platform_assets"
  start_years: 5
  end_date: "today"
  cache_dir: "artifacts/cache"
  cache_tag: null
  cache_mode: "symbol"
  cache_refresh_days: 10
  cache_refresh_on_hit: false
  price_col: "close"
  retry:
    max_attempts: 1
    backoff_seconds: 0.5
    max_backoff_seconds: 5.0
  rqdata:
    market: "hk"
    frequency: "1d"
    skip_suspended: true
    fields: ["close", "volume", "total_turnover"]
    daily_asset_dir: "artifacts/assets/rqdata/hk/daily/hk_all_daily_clean_latest"
    instruments_file: "artifacts/assets/rqdata/hk/instruments/hk_all_instruments_latest.parquet"
    ex_factors_dir: "artifacts/assets/rqdata/hk/ex_factors/hk_all_ex_factors_latest"
  column_map:
    trade_date: trade_date
    symbol: ts_code
    close: close
    vol: volume
    amount: total_turnover

fundamentals:
  enabled: true
  source: "file"
  file: "artifacts/assets/rqdata/hk/pit_financials/hk_all_2000_2025_full_market_latest/pipeline_fundamentals.parquet"
  endpoint: "get_factor"
  fields:
    - "revenue"
    - "operating_revenue"
    - "net_profit"
    - "basic_earnings_per_share"
  symbol_param: "symbol"
  start_param: "start_date"
  end_param: "end_date"
  params: {}
  column_map:
    trade_date: trade_date
    symbol: ts_code
    revenue: revenue
    operating_revenue: operating_revenue
    net_profit: net_profit
    basic_earnings_per_share: basic_earnings_per_share
  features:
    - sales
    - net_profit
    - basic_earnings_per_share
  auto_add_features: true
  allow_missing_features: true
  required: false
  ffill: true
  ffill_limit: null
  log_market_cap: false
  market_cap_col: "market_cap"
  log_market_cap_col: "log_mcap"

research_universe:
  mode: "static"
  require_by_date: false
  symbols:
    - "00005.HK"
    - "00700.HK"
    - "00941.HK"
    - "00388.HK"
    - "00883.HK"
    - "02318.HK"
    - "03690.HK"
    - "09988.HK"
    - "01299.HK"
    - "01398.HK"
  symbols_file: null
  by_date_file: null
  min_symbols_per_date: 5
  min_listed_days: 0
  min_turnover: 0
  drop_st: false
  drop_suspended: true
  suspended_policy: "mark"

label:
  horizon_mode: "next_rebalance"
  rebalance_frequency: "M"
  horizon_days: 20
  shift_days: 1
  target_col: "future_return"
  winsorize_pct: null

features:
  list:
    - sma_20
    - sma_60
    - sma_120
    - sma_5_diff
    - sma_10_diff
    - sma_20_diff
    - sma_60_diff
    - sma_120_diff
    - rsi_7
    - rsi_14
    - rsi_21
    - macd_hist
    - ret_5
    - ret_20
    - ret_60
    - rv_20
    - rv_60
    - volume_sma5_ratio
    - volume_sma20_ratio
    - volume_sma60_ratio
    - log_vol
    - vol
  params:
    sma_windows: [5, 10, 20, 60, 120]
    rsi: [7, 14, 21]
    macd: [12, 26, 9]
    ret_windows: [5, 20, 60]
    rv_windows: [20, 60]
    volume_sma_windows: [5, 20, 60]
  cross_sectional:
    method: "zscore"
    winsorize_pct: 0.01

model:
  type: xgb_regressor
  params:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 3
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.0
    reg_lambda: 1.0
    objective: "reg:squarederror"
    random_state: 42
  sample_weight_mode: "date_equal"

eval:
  test_size: 0.2
  n_splits: 5
  n_quantiles: 5
  rebalance_frequency: "M"
  top_k: 5
  signal_direction: 1
  signal_direction_mode: "cv_ic"
  min_abs_ic_to_flip: 0.002
  transaction_cost_bps: 25
  buffer_exit: 2
  buffer_entry: 1
  sample_on_rebalance_dates: true
  embargo_days: null
  purge_days: null
  report_train_ic: true
  save_artifacts: true
  save_scored_artifact: false
  save_dataset: false
  output_dir: "artifacts/runs"
  run_name: null
  permutation_test:
    enabled: false
    n_runs: 3
    seed: 42
  walk_forward:
    enabled: true
    n_windows: 3
    test_size: null
    step_size: null
    anchor_end: true
    backtest_enabled: true
    permutation_test:
      enabled: false
      n_runs: 3
      seed: 42
  final_oos:
    enabled: false
    size: null

backtest:
  enabled: true
  top_k: 5
  rebalance_frequency: "M"
  transaction_cost_bps: 25
  trading_days_per_year: 252
  long_only: true
  short_k: null
  benchmark_symbol: null
  exit_mode: "rebalance"
  exit_horizon_days: null
  buffer_exit: 2
  buffer_entry: 1
  exit_price_policy: "delay"
  exit_fallback_policy: "ffill"
