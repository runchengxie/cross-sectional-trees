## HK quarterly PIT fundamentals baseline.
## Prepare the file first:
## 1) csml rqdata mirror-hk-pit-financials --name hk_selected_pit_2011_2025_latest ...
## 2) csml rqdata build-hk-pit-fundamentals --asset-dir artifacts/assets/rqdata/hk/pit_financials/hk_selected_pit_2011_2025_latest ...
market: hk
data:
  provider: rqdata
  start_date: '20150101'
  end_date: '20251231'
  cache_dir: artifacts/cache
  cache_tag: null
  cache_mode: symbol
  cache_refresh_days: 10
  cache_refresh_on_hit: false
  price_col: close
  retry:
    max_attempts: 1
    backoff_seconds: 0.5
    max_backoff_seconds: 5.0
    rotate_tokens: true
  eodhd:
    exchange: HK
    period: d
    order: a
    fmt: json
    hk_symbol_mode: strip_one
  rqdata:
    market: hk
    frequency: 1d
    skip_suspended: true
    fields:
    - close
    - volume
    - total_turnover
  column_map:
    trade_date: trade_date
    ts_code: ts_code
    close: close
    vol: volume
    amount: total_turnover
fundamentals:
  enabled: true
  source: file
  file: artifacts/assets/rqdata/hk/pit_financials/hk_selected_pit_2011_2025_latest/pipeline_fundamentals.parquet
  column_map: {}
  features:
  - revenue
  - net_profit
  - total_assets
  - total_liabilities
  - cash_flow_from_operating_activities
  - accounts_receivable
  - inventory
  - profit_margin
  - asset_turnover
  - roa
  - leverage
  - cfo_to_assets
  - accrual_ratio
  - receivables_to_revenue
  - inventory_to_revenue
  auto_add_features: true
  allow_missing_features: true
  required: true
  ffill: true
  ffill_limit: null
  log_market_cap: false
universe:
  mode: pit
  require_by_date: true
  symbols: []
  symbols_file: null
  by_date_file: artifacts/assets/universe/universe_by_date.csv
  min_symbols_per_date: 5
  min_listed_days: 60
  min_turnover: 10000000
  drop_st: false
  drop_suspended: true
  suspended_policy: mark
label:
  horizon_mode: next_rebalance
  rebalance_frequency: Q
  horizon_days: 63
  shift_days: 1
  target_col: future_return
  winsorize_pct: 0.01
features:
  list:
  - profit_margin
  cross_sectional:
    method: zscore
    winsorize_pct: 0.01
model:
  type: xgb_regressor
  params:
    n_estimators: 200
    learning_rate: 0.03
    max_depth: 2
    subsample: 0.8
    colsample_bytree: 0.7
    reg_alpha: 0.0
    reg_lambda: 1.0
    objective: reg:squarederror
    random_state: 42
  sample_weight_mode: date_equal
eval:
  test_size: 0.5
  n_splits: 4
  n_quantiles: 5
  rebalance_frequency: Q
  top_k: 20
  signal_direction: 1
  signal_direction_mode: cv_ic
  min_abs_ic_to_flip: 0.002
  transaction_cost_bps: 25
  buffer_exit: 8
  buffer_entry: 4
  sample_on_rebalance_dates: false
  embargo_days: 20
  purge_days: null
  report_train_ic: true
  save_artifacts: true
  save_dataset: false
  output_dir: artifacts/runs
  run_name: hk_sel_xgb_pit_q_base
  permutation_test:
    enabled: true
    n_runs: 10
    seed: 42
  walk_forward:
    enabled: true
    n_windows: 4
    test_size: null
    step_size: null
    anchor_end: true
    backtest_enabled: true
    permutation_test:
      enabled: false
      n_runs: 5
      seed: 42
  final_oos:
    enabled: false
    size: null
backtest:
  enabled: true
  top_k: 20
  rebalance_frequency: Q
  transaction_cost_bps: 25
  trading_days_per_year: 252
  long_only: true
  short_k: null
  benchmark_symbol: 02800.HK
  exit_mode: rebalance
  exit_horizon_days: null
  buffer_exit: 8
  buffer_entry: 4
  exit_price_policy: delay
  exit_fallback_policy: ffill
