## Monthly HK selected baseline with local RQData assets and lagged-ADV
## execution stress assumptions. Keep the signal recipe unchanged; only make
## the data path offline-friendly and avoid same-day amount look-ahead.
extends:
  - configs/experiments/baseline/hk_selected.yml

data:
  cache_tag: hk_selected_exec_stress_adv20_local_v3
  rqdata:
    daily_asset_dir: artifacts/assets/rqdata/hk/daily/hk_all_daily_clean_latest
    instruments_file: artifacts/assets/rqdata/hk/instruments/hk_all_instruments_latest.parquet
    ex_factors_dir: artifacts/assets/rqdata/hk/ex_factors/hk_all_ex_factors_latest

fundamentals:
  source: file
  file: artifacts/assets/rqdata/hk/pit_financials/hk_selected_pit_2011_2025_latest/pipeline_fundamentals_with_provider_valuation_asof.parquet
  column_map: {}
  required: true
  market_cap_col: market_cap
  log_market_cap_col: log_mcap

eval:
  run_name: hk_sel_xgb_reg_exec_stress_adv20_local

backtest:
  execution:
    entry_policy:
      price_col: open
    exit_policy:
      price: delay
      fallback: ffill
      price_col: close
    cost_model:
      name: side_bps
      buy_bps: 25
      sell_bps: 25
    slippage_model:
      name: participation
      amount_col: adv20_amount
      base_bps: 2
      impact_bps: 20
      portfolio_value: 1000000
      power: 0.5
      max_participation: 0.1
    constraints:
      min_price: 5
      min_amount: 1000000
      amount_col: adv20_amount
