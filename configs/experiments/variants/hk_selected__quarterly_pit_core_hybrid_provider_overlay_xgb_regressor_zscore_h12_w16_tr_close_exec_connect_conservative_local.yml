## Quarterly primary challenger under the stricter connect-conservative
## execution profile. Keep the target, price chain, and model route
## unchanged while tightening the liquidity floor.
extends:
  - configs/experiments/variants/hk_selected__quarterly_pit_core_hybrid_provider_overlay_exec_connect_conservative_local_base.yml
  - configs/presets/models/xgb_regressor.yml

data:
  price_col: tr_close
  cache_tag: hk_sel_q_g4_fixed_pit_overlay_xgb_reg_zscore_h12_w16_tr_close_exec_connect_conservative_local_v1

label:
  train_target_transform: zscore

model:
  params:
    learning_rate: 0.03
  sample_weight_mode: exp_decay
  sample_weight_params:
    halflife: 12
  train_window:
    mode: rolling
    size: 16
    unit: dates

eval:
  run_name: hk_sel_q_g4_fixed_pit_overlay_xgb_reg_zscore_h12_w16_tr_close_exec_connect_conservative_local
