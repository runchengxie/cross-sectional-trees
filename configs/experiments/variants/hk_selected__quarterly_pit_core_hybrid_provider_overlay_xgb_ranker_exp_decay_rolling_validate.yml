## Anti-drift template v2 on the canonical quarterly overlay unit.
## Add a rolling train window on top of exp-decay weighting so the model only
## fits the most recent quarterly training dates.
extends:
  - hk_selected__quarterly_pit_core_hybrid_provider_overlay_xgb_ranker_exp_decay_validate.yml

model:
  train_window:
    mode: rolling
    size: 16
    unit: dates

eval:
  run_name: hk_sel_q_g4_fixed_pit_overlay_xgb_rank_expdecay_roll16_validate
