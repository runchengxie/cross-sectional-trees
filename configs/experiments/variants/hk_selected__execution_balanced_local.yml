## Monthly HK selected baseline with local assets and a calibrated balanced
## execution profile based on the current HK 5m slippage calibration report.
extends:
  - configs/experiments/variants/hk_selected__execution_stress_local.yml

data:
  cache_tag: hk_selected_exec_balanced_local_v1

eval:
  run_name: hk_sel_xgb_reg_exec_balanced_local

backtest:
  execution:
    slippage_model:
      base_bps: 4
      impact_bps: 50
      max_participation: 0.05
    constraints:
      min_amount: 10000000
