## Current guarded monthly ranker challenger on the dated 2026-04-02 asset
## stack. This freezes the monthly `no_ret` ranker-native `trial_008` signal,
## uses the `k15 / bx25 / be12` construction that survived the fixed-signal
## grid, and applies a minimal first-industry cap of 4 names.
market: hk

data:
  provider: rqdata
  start_date: "20150101"
  end_date: "20260327"
  cache_dir: artifacts/cache
  cache_tag: hk_sel_m_pit_no_ret_ranker_trial008_gc4_k15_bx25_be12_v1
  cache_mode: symbol
  cache_refresh_days: 10
  cache_refresh_on_hit: false
  price_col: tr_close
  retry:
    max_attempts: 1
    backoff_seconds: 0.5
    max_backoff_seconds: 5.0
  rqdata:
    market: hk
    frequency: 1d
    skip_suspended: true
    fields:
      - close
      - volume
      - total_turnover
    daily_asset_dir: artifacts/assets/rqdata/hk/daily/hk_all_2000_20260402_daily_clean_refetched_latest
    instruments_file: artifacts/assets/rqdata/hk/instruments/hk_all_instruments_20260402.parquet
    ex_factors_dir: artifacts/assets/rqdata/hk/ex_factors/hk_all_2000_20260402_ex_factors_full_market_latest
  column_map:
    trade_date: trade_date
    symbol: ts_code
    close: close
    vol: volume
    amount: total_turnover

fundamentals:
  enabled: true
  source: file
  file: artifacts/assets/rqdata/hk/pit_financials/hk_selected_pit_2011_2025_latest/pipeline_fundamentals.parquet
  endpoint: get_factor
  fields:
    - hk_total_market_val
    - pe_ratio_ttm
    - pb_ratio_ttm
  symbol_param: symbol
  start_param: start_date
  end_param: end_date
  params: {}
  column_map:
    trade_date: trade_date
    symbol: ts_code
    market_cap: hk_total_market_val
    pe_ttm: pe_ratio_ttm
    pb: pb_ratio_ttm
  features:
    - revenue
    - operating_revenue
    - net_profit
    - basic_earnings_per_share
    - cash_flow_from_operating_activities
  auto_add_features: false
  allow_missing_features: true
  required: true
  ffill: true
  ffill_limit: null
  log_market_cap: false
  market_cap_col: market_cap
  log_market_cap_col: log_mcap

research_universe:
  mode: pit
  require_by_date: true
  symbols: []
  symbols_file: null
  by_date_file: artifacts/assets/universe/hk_selected_pit_research_by_date_valuation_gate_20260401.csv
  min_symbols_per_date: 10
  min_listed_days: 60
  min_turnover: 10000000
  drop_st: false
  drop_suspended: true
  suspended_policy: mark

label:
  horizon_mode: next_rebalance
  rebalance_frequency: M
  horizon_days: 20
  shift_days: 1
  target_col: future_return
  winsorize_pct: 0.01

features:
  list:
    - rv_20
    - rv_60
    - volume_sma20_ratio
    - volume_sma60_ratio
    - log_vol
    - vol
    - sales
    - growth_sales
    - basic_earnings_per_share
    - growth_basic_earnings_per_share
    - net_profit
    - growth_net_profit
    - cash_flow_from_operating_activities
    - growth_cash_flow_from_operating_activities
    - profit_margin
    - cfo_margin
    - cfo_to_profit
    - days_since_report
  params:
    sma_windows: [5, 10, 20]
    rsi: 14
    macd: [12, 26, 9]
    volume_sma_windows: [20, 60]
    ret_windows: []
    rv_windows: [20, 60]
  cross_sectional:
    method: rank
    winsorize_pct: 0.01
  missing:
    method: cross_sectional_median
    add_indicators: false
    features:
      - sales
      - growth_sales
      - basic_earnings_per_share
      - growth_basic_earnings_per_share
      - net_profit
      - growth_net_profit
      - cash_flow_from_operating_activities
      - growth_cash_flow_from_operating_activities
      - profit_margin
      - cfo_margin
      - cfo_to_profit
      - days_since_report

model:
  type: xgb_ranker
  params:
    n_estimators: 300
    learning_rate: 0.03
    max_depth: 2
    subsample: 0.7
    colsample_bytree: 0.7
    reg_alpha: 0.5
    reg_lambda: 10.0
    objective: rank:pairwise
    random_state: 42
    min_child_weight: 10
  sample_weight_mode: exp_decay
  sample_weight_params:
    halflife: 6
  train_window:
    mode: rolling
    size: 48
    unit: dates

eval:
  test_size: 0.5
  n_splits: 5
  n_quantiles: 5
  rebalance_frequency: M
  top_k: 15
  signal_direction: 1
  signal_direction_mode: cv_ic
  min_abs_ic_to_flip: 0.002
  transaction_cost_bps: 25
  buffer_exit: 25
  buffer_entry: 12
  sample_on_rebalance_dates: true
  embargo_days: 20
  purge_days: 22
  report_train_ic: true
  save_artifacts: true
  save_scored_artifact: true
  save_dataset: false
  output_dir: artifacts/runs
  run_name: hk_sel_m_pit_no_ret_ranker_trial008_gc4_k15_bx25_be12
  permutation_test:
    enabled: false
    n_runs: 10
    seed: 42
  walk_forward:
    enabled: true
    n_windows: 4
    test_size: 0.2
    step_size: 0.1
    anchor_end: true
    backtest_enabled: true
    permutation_test:
      enabled: false
      n_runs: 10
      seed: 42
  final_oos:
    enabled: true
    size: 24
  bucket_ic:
    enabled: true
    schemes:
      - industry_name
  rolling:
    windows_months: [12, 24, 36]

backtest:
  enabled: true
  top_k: 15
  rebalance_frequency: M
  transaction_cost_bps: 25
  trading_days_per_year: 252
  long_only: true
  short_k: null
  benchmark_symbol: null
  exit_mode: rebalance
  exit_horizon_days: null
  buffer_exit: 25
  buffer_entry: 12
  exit_price_policy: delay
  exit_fallback_policy: ffill
  benchmark_returns_file: artifacts/benchmarks/hk_selected_pit_research_m_capw_open_close_20181101_20260202.csv
  benchmark_compare:
    - name: hk_3432
      returns_file: artifacts/benchmarks/hk_03432_open_close_20240902_20260401.csv
    - name: hk_02800
      returns_file: artifacts/benchmarks/hk_02800_open_close_20181101_20260202.csv
    - name: hk_selected_pit_research_eqw
      returns_file: artifacts/benchmarks/hk_selected_pit_research_m_eqw_open_close_20181101_20260202.csv
    - name: hk_selected_pit_research_capw
      returns_file: artifacts/benchmarks/hk_selected_pit_research_m_capw_open_close_20181101_20260202.csv
    - name: hk_connect_full_capw
      returns_file: artifacts/benchmarks/hk_connect_full_research_m_capw_open_close_20181101_20260202.csv
  group_col: first_industry_name
  max_names_per_group: 4
  execution:
    entry_policy:
      price_col: open
    exit_policy:
      price: delay
      fallback: ffill
      price_col: close
    cost_model:
      name: side_bps
      buy_bps: 25
      sell_bps: 25
    slippage_model:
      name: participation
      amount_col: adv20_amount
      base_bps: 4
      impact_bps: 50
      portfolio_value: 1000000
      power: 0.5
      max_participation: 0.05
    constraints:
      min_price: 5
      min_amount: 10000000
      amount_col: adv20_amount

industry:
  enabled: true
  source: file
  file: artifacts/assets/rqdata/hk/industry_changes/hk_all_2000_20260402_industry_changes_full_market_latest/industry_labels_m.parquet
  keep_columns:
    - industry_name
    - first_industry_name
  ffill: false
  required: true
