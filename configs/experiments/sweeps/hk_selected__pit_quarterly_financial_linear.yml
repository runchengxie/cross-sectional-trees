# Linear sweep spec for the HK quarterly PIT financial baseline.
# Use with:
#   csml sweep-linear --sweep-config configs/experiments/sweeps/hk_selected__pit_quarterly_financial_linear.yml

base_config: configs/experiments/variants/hk_selected__pit_quarterly_financial_ml.yml
run_name_prefix: hk_finmlq_
tag: hk_pit_quarterly_financial_linear
sweeps_dir: artifacts/sweeps
runs_dir: artifacts/runs

grid:
  ridge_alpha: [0.3, 1, 3, 10, 30]
  elasticnet_alpha: [0.003, 0.01, 0.03, 0.1]
  elasticnet_l1_ratio: [0.05, 0.1, 0.2, 0.4]

options:
  skip_ridge: false
  skip_elasticnet: false
  dry_run: false
  continue_on_error: false
  skip_summarize: false
  summary_output: null
  log_level: INFO
