## Monthly PIT sidecar with a minimal industry-aware portfolio constraint.
## Start from the observe-only overlay, then cap holdings per first-level
## industry to test whether a cleaner industry spread improves robustness.
extends:
  - configs/local/hk_selected__m_pit_core_hybrid_sidecar_industry_observe_tr_close_exec_balanced.yml

eval:
  run_name: hk_sel_m_pit_core_hybrid_sidecar_industry_groupcap4_tr_close_exec_balanced

data:
  cache_tag: hk_sel_m_pit_core_hybrid_sidecar_industry_groupcap4_tr_close_exec_balanced_v1

backtest:
  group_col: first_industry_name
  max_names_per_group: 4
