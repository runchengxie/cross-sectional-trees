# Linear sweep spec for HK quarterly PIT fundamentals baseline.
# Use with:
#   csml sweep-linear --sweep-config config/sweeps/hk_selected__pit_quarterly_linear.yml

base_config: config/hk_selected__baseline_pit_quarterly.yml
run_name_prefix: hk_pitq_
tag: hk_pit_quarterly_linear
sweeps_dir: out/sweeps
runs_dir: out/runs

grid:
  ridge_alpha: [0.01, 0.1, 1, 10, 100]
  elasticnet_alpha: [0.003, 0.01, 0.03, 0.1]
  elasticnet_l1_ratio: [0.02, 0.05, 0.1, 0.2]

options:
  skip_ridge: false
  skip_elasticnet: false
  dry_run: false
  continue_on_error: false
  skip_summarize: false
  summary_output: null
  log_level: INFO
